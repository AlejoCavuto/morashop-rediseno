<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Producto · Morashop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/cart.css" />
<style>
  :root {
    --ink:        #ECEDEF;
    --ink-deep:   #E3E5E8;
    --navy:       #FFFFFF;
    --cream:      #1A2744;
    --red:        #E8341A;
    --red-deep:   #C42710;
    --green:      #00A650;
    --line:       rgba(26,39,68,0.14);
    --line-soft:  rgba(26,39,68,0.08);
    --muted:      rgba(26,39,68,0.58);
    --font-d: "Barlow Condensed","Arial Narrow",sans-serif;
    --font-b: "Inter",system-ui,sans-serif;
    --pad-x: clamp(20px,5vw,96px);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--cream)}
  body{font-family:var(--font-b);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;padding-bottom:88px}
  img{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
  .container{width:100%;max-width:1280px;margin:0 auto;padding:0 var(--pad-x)}
  .overline{width:64px;height:3px;background:var(--red);display:block}

  /* ---------- NAV ---------- */
  .nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;height:74px}
  .nav-logos{display:flex;align-items:center;gap:8px}
  .nav-logos a{display:flex;align-items:center;transition:transform .15s ease}
  .nav-logos a:hover{transform:translateY(-1px)}
  .nav-logos img{height:34px;width:auto;display:block}
  .nav-links{display:flex;align-items:center;gap:32px}
  .nav-links a{font-size:12px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--cream);opacity:0.7;transition:opacity .15s ease}
  .nav-links a:hover{opacity:1}
  .nav-actions{display:flex;align-items:center;gap:12px}
  .icon-btn{width:44px;height:44px;display:grid;place-items:center;border-radius:999px;color:var(--cream);transition:background .15s ease;position:relative;background:transparent;border:0;cursor:pointer}
  .icon-btn:hover{background:rgba(26,39,68,0.08)}
  .cart-badge{position:absolute;top:6px;right:6px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;padding:0 4px;border-radius:999px;display:grid;place-items:center}
  .hamb,.hamb-mobile{display:none}
  .nav-search{display:none;position:sticky;top:74px;z-index:49;background:rgba(255,255,255,0.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);padding:10px var(--pad-x)}
  .nav-search form{display:flex;align-items:center;gap:10px;background:rgba(26,39,68,0.06);border:1px solid var(--line);border-radius:999px;padding:10px 16px}
  .nav-search input{flex:1;background:transparent;border:0;outline:none;color:var(--cream);font-family:var(--font-b);font-size:14px;padding:0}
  .nav-search input::placeholder{color:rgba(26,39,68,0.45)}
  .nav-search button{display:grid;place-items:center;background:transparent;border:0;color:var(--cream);opacity:0.7;cursor:pointer;flex-shrink:0}

  /* ---------- PDP CRUMB (clickeable, estilo ML) ---------- */
  .pdp-crumb{padding:14px 0 4px;font-size:12px;font-weight:500;display:flex;align-items:center;flex-wrap:wrap;gap:4px}
  .pdp-crumb a{color:var(--red);text-decoration:none;transition:opacity .15s ease;cursor:pointer}
  .pdp-crumb a:hover{opacity:0.7;text-decoration:underline}
  .pdp-crumb .sep{margin:0 6px;color:var(--muted)}
  .pdp-crumb > span:last-child{color:var(--muted);opacity:0.75;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ---------- PDP MAIN ---------- */
  .pdp{padding:24px 0 64px}
  .pdp-grid{display:grid;grid-template-columns:1.05fr 0.95fr;gap:48px;align-items:start}

  /* Gallery */
  .pdp-gallery{position:sticky;top:90px}
  .pdp-photo{aspect-ratio:1/1;background:#fff;border:1px solid var(--line);border-radius:10px;display:grid;place-items:center;padding:48px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(26,39,68,0.08)}
  .pdp-photo img{max-width:85%;max-height:85%;object-fit:contain;filter:drop-shadow(0 20px 32px rgba(26,39,68,0.16));transition:transform .35s ease}
  .pdp-photo:hover img{transform:scale(1.03)}
  .pdp-tag{position:absolute;top:18px;left:18px;font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;background:var(--red);color:#fff;padding:6px 12px;border-radius:4px}
  .pdp-tag.sale{background:var(--red);color:#fff}

  /* Info */
  .pdp-brand{font-size:11px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;opacity:0.55;margin-bottom:14px}
  .pdp-name{font-family:var(--font-b);font-weight:600;font-size:clamp(20px,2.4vw,28px);line-height:1.25;letter-spacing:0;text-transform:none;margin:0 0 18px;color:var(--cream)}
  .pdp-price-row{display:flex;align-items:baseline;gap:14px;margin-bottom:28px;flex-wrap:wrap}
  .pdp-price{font-family:var(--font-d);font-weight:900;font-size:clamp(36px,4.5vw,56px);line-height:1;color:var(--cream)}
  .pdp-oldprice{font-family:var(--font-b);font-size:18px;font-weight:600;opacity:0.4;text-decoration:line-through}
  .pdp-discount{font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;background:var(--red);color:#fff;padding:6px 10px;border-radius:2px}
  .pdp-savings{font-size:14px;color:#E8341A;font-weight:700;margin-top:6px;margin-bottom:18px}

  /* Payment hint */
  .pdp-hint{font-size:13px;line-height:1.5;opacity:1;padding:14px 16px;background:rgba(232,52,26,0.07);border:1px solid rgba(232,52,26,0.25);border-radius:6px;margin-bottom:18px;color:var(--cream)}
  .pdp-hint strong{color:var(--red);font-weight:700}

  /* Cuotas (1 línea chica gris/rojo) */
  .pdp-cuotas{font-family:var(--font-b);font-size:13.5px;color:var(--red);font-weight:500;line-height:1.3;margin:0 0 10px}
  .pdp-cuotas strong{font-weight:700;color:var(--red)}

  /* Efectivo: línea verde con tag + tooltip "?" en lugar de nota larga */
  .pdp-efectivo{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin:0 0 22px;font-family:var(--font-b)}
  .pdp-efectivo-main{font-size:14px;color:#00a650;font-weight:500;line-height:1.3}
  .pdp-efectivo-main strong{font-size:16px;font-weight:700}
  .pdp-efectivo-tag{font-size:11px;font-weight:700;letter-spacing:0.04em;background:#00a650;color:#fff;padding:3px 8px;border-radius:4px;line-height:1}
  .pdp-efectivo-info{width:18px;height:18px;border-radius:999px;background:rgba(0,166,80,0.12);color:#00a650;border:0;font-size:11px;font-weight:700;cursor:help;display:grid;place-items:center;line-height:1;padding:0}
  .pdp-efectivo-info:hover{background:rgba(0,166,80,0.22)}

  /* Social proof + stock (entre hint y cantidad) */
  .pdp-social{display:flex;flex-direction:column;gap:6px;margin-bottom:24px;padding:12px 14px;background:rgba(26,39,68,0.035);border-radius:6px}
  .pdp-social-line{font-size:13px;color:var(--muted);line-height:1.35;display:flex;flex-wrap:wrap;align-items:center;gap:6px}
  .pdp-social-line .dot{opacity:0.45}
  .pdp-social-line .star{color:#f5b400}
  .pdp-social-line .rating-num{color:var(--cream);font-weight:700}
  .pdp-stock{font-size:13.5px;color:var(--cream);font-weight:600;line-height:1.35;display:flex;align-items:center;gap:8px}
  .pdp-stock .dot{width:7px;height:7px;border-radius:999px;background:var(--green);flex-shrink:0}
  .pdp-stock.low{color:var(--red);font-weight:700}
  .pdp-stock.low .dot{background:var(--red);animation:stockPulse 1.4s ease-in-out infinite}
  @keyframes stockPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.7}}

  /* Selectors */
  .pdp-section{margin-bottom:24px}
  .pdp-section-label{font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;opacity:0.55;margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .pdp-section-label .picked{color:var(--cream);opacity:1}
  .pdp-flavors{display:flex;gap:8px;flex-wrap:wrap}
  .flavor-btn{padding:11px 18px;border:1.5px solid var(--line);background:transparent;color:var(--cream);font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;border-radius:999px;cursor:pointer;transition:border-color .15s ease, background .15s ease;font-family:var(--font-b)}
  .flavor-btn:hover{border-color:rgba(26,39,68,0.5)}
  .flavor-btn.active{background:var(--cream);color:var(--ink);border-color:var(--cream)}

  /* Qty + add */
  .pdp-buy{display:flex;gap:12px;align-items:stretch;margin-bottom:24px}
  .qty-stepper{display:inline-flex;align-items:center;border:1.5px solid var(--line);border-radius:2px;overflow:hidden}
  .qty-stepper button{width:46px;height:54px;display:grid;place-items:center;background:transparent;color:var(--cream);cursor:pointer;font-size:18px;font-weight:700;transition:background .15s ease}
  .qty-stepper button:hover{background:rgba(26,39,68,0.08)}
  .qty-stepper span{min-width:48px;text-align:center;font-family:var(--font-d);font-weight:900;font-size:18px;border-left:1px solid var(--line);border-right:1px solid var(--line);height:54px;display:grid;place-items:center}
  .add-btn{flex:1;background:var(--cream);color:#fff;border:0;padding:18px 24px;font-family:var(--font-d);font-weight:900;font-size:14px;letter-spacing:0.14em;text-transform:uppercase;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:9px;transition:background .18s ease, transform .15s ease}
  .add-btn:hover{background:#0F1729;transform:translateY(-1px)}
  .cart-ic{width:18px;height:18px;flex-shrink:0}

  .pdp-perks{display:flex;flex-direction:column;gap:10px;padding-top:18px;border-top:1px solid var(--line-soft)}
  .pdp-perk{display:flex;align-items:center;gap:12px;font-size:13px;opacity:0.78}
  .pdp-perk svg{flex-shrink:0;opacity:0.7}
  .pdp-perk strong{color:var(--cream);opacity:1;font-weight:600}

  /* ---------- TABS ---------- */
  .pdp-tabs{padding:48px 0 32px;border-top:1px solid var(--line-soft);margin-top:48px}
  .tab-nav{display:flex;gap:24px;border-bottom:1px solid var(--line-soft);margin-bottom:32px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
  .tab-nav::-webkit-scrollbar{display:none}
  .tab-btn{background:transparent;border:0;padding:18px 4px;font-family:var(--font-d);font-weight:800;font-size:14px;letter-spacing:0.16em;text-transform:uppercase;color:var(--cream);opacity:0.5;cursor:pointer;transition:opacity .15s ease;position:relative;flex-shrink:0;white-space:nowrap}
  .tab-btn:hover{opacity:0.85}
  .tab-btn.active{opacity:1}
  .tab-btn.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--red)}
  .tab-panel{display:none;max-width:760px}
  .tab-panel.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .tab-panel p{font-size:15px;line-height:1.65;opacity:0.78;margin:0 0 16px;max-width:640px}
  .nutri-table{width:100%;max-width:480px;border-collapse:collapse}
  .nutri-table tr{border-bottom:1px solid var(--line-soft)}
  .nutri-table td{padding:14px 0;font-size:14px}
  .nutri-table td:first-child{opacity:0.65}
  .nutri-table td:last-child{text-align:right;font-family:var(--font-d);font-weight:800;font-size:16px;letter-spacing:0.005em}

  /* ---------- RELATED (ML-style cards) ---------- */
  .related{padding:64px 0 48px;border-top:1px solid var(--line-soft);background:var(--ink)}
  .related-head{margin-bottom:28px}
  .related-head h2{font-family:var(--font-d);font-weight:900;font-size:clamp(32px,4.5vw,60px);line-height:0.95;letter-spacing:-0.015em;text-transform:uppercase;margin:14px 0 0;color:var(--cream)}
  .related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  /* ML card (replicada de index.html para mantener consistencia visual) */
  .mlcard{background:#fff;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;position:relative;transition:transform .2s ease, box-shadow .2s ease;cursor:pointer;box-shadow:0 1px 3px rgba(26,39,68,0.08);text-decoration:none;color:inherit}
  .mlcard:hover{transform:translateY(-3px);box-shadow:0 12px 28px -8px rgba(26,39,68,0.22)}
  .mlcard-ph{position:relative;background:#fff;aspect-ratio:1/1;display:grid;place-items:center;padding:18px}
  .mlcard-ph img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain}
  .mlcard-off{position:absolute;top:10px;left:10px;background:var(--red);color:#fff;font-family:var(--font-b);font-weight:800;font-size:11px;letter-spacing:0.02em;padding:5px 9px;border-radius:4px;z-index:2}
  .mlcard-info{padding:12px 14px 16px;display:flex;flex-direction:column;flex:1}
  .mlcard-brand{font-family:var(--font-b);font-size:10px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:#8a8f98;margin-bottom:4px}
  .mlcard-name{font-family:var(--font-b);font-size:13.5px;font-weight:400;line-height:1.32;color:#2d3138;margin:0 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.64em}
  .mlcard-was{font-family:var(--font-b);font-size:12px;color:#9aa0a8;text-decoration:line-through;line-height:1;margin-bottom:3px}
  .mlcard-price-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .mlcard-price{font-family:var(--font-b);font-weight:600;font-size:21px;line-height:1;color:#1a1d22;letter-spacing:-0.01em}
  .mlcard-disc{font-family:var(--font-b);font-weight:700;font-size:12.5px;color:var(--red);line-height:1}
  .mlcard-cuotas{font-family:var(--font-b);font-size:12px;color:var(--red);font-weight:600;line-height:1.3;margin-top:6px}
  .mlcard-foot{margin-top:auto;padding-top:12px}
  .mlcard-add{width:100%;background:var(--cream);color:#fff;border-radius:5px;padding:13px;font-family:var(--font-b);font-weight:700;font-size:12px;letter-spacing:0.05em;text-transform:uppercase;transition:background .15s ease;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;border:0}
  .mlcard-add:hover{background:#0F1729}

  /* ---------- STICKY BUY (mobile) ---------- */
  .pdp-sticky{display:none;position:fixed;left:0;right:0;bottom:0;z-index:80;background:rgba(255,255,255,0.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:10px var(--pad-x) calc(10px + env(safe-area-inset-bottom));box-shadow:0 -10px 30px -10px rgba(0,0,0,0.18)}
  .pdp-sticky button{width:100%;background:var(--cream);color:#fff;border:0;padding:15px 18px;font-family:var(--font-d);font-weight:900;font-size:14px;letter-spacing:0.08em;text-transform:uppercase;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .18s ease;position:relative}
  .pdp-sticky button:hover{background:#0F1729}
  .pdp-sticky button .cart-ic{width:18px;height:18px;flex-shrink:0}
  .pdp-sticky button .sticky-qty-badge{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.22);border-radius:999px;padding:3px 9px;font-size:11px;font-weight:800;letter-spacing:0.04em;min-width:22px;text-align:center}

  /* ---------- ERROR (id no encontrado) ---------- */
  .pdp-error{padding:120px 0;text-align:center}
  .pdp-error h1{font-family:var(--font-d);font-weight:900;font-size:clamp(40px,5vw,72px);margin:0 0 14px;text-transform:uppercase;letter-spacing:-0.005em}
  .pdp-error p{opacity:0.6;margin:0 0 24px}
  .pdp-error a{display:inline-flex;align-items:center;gap:10px;padding:16px 26px;border:1.5px solid var(--cream);color:var(--cream);font-family:var(--font-d);font-weight:800;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;border-radius:2px;transition:background .18s ease, color .18s ease}
  .pdp-error a:hover{background:var(--cream);color:var(--ink)}

  /* ---------- FOOTER ---------- */
  footer{background:var(--ink-deep);color:var(--cream);padding:48px 0 32px}
  footer .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px;font-size:12px;opacity:0.55;letter-spacing:0.04em}

  /* ---------- FLOATING WHATSAPP ---------- */
  .wa-float{position:fixed;right:24px;bottom:96px;width:48px;height:48px;border-radius:999px;background:#25D366;color:#fff;display:grid;place-items:center;z-index:75;box-shadow:0 10px 24px -6px rgba(0,0,0,0.45);transition:transform .2s ease}
  .wa-float:hover{transform:scale(1.08)}
  .wa-float svg{width:24px;height:24px}

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:960px){
    .pdp-grid{grid-template-columns:1fr;gap:20px}
    .pdp-gallery{position:relative;top:auto}
    .pdp-photo{padding:24px;aspect-ratio:1/1.05}
    .related-grid{grid-template-columns:repeat(2,1fr);gap:14px}
  }
  @media (max-width:768px){
    .nav-links{display:none}
    .hamb-mobile{display:grid;place-items:center}
    .nav-actions .btn{display:none}
    .nav-logos{justify-self:center;gap:6px}
    .nav-logos img{height:32px}
    .nav-search{display:block}
    .pdp{padding:8px 0 100px}
    /* Foto MÁS CHICA en mobile: altura fija sin aspect-ratio (evita conflictos de centrado) */
    .pdp-gallery{margin-bottom:0;width:100%;max-width:280px;margin-left:auto;margin-right:auto}
    .pdp-photo{padding:18px;aspect-ratio:auto;height:240px;border-radius:8px;display:flex;align-items:center;justify-content:center}
    .pdp-photo img{max-width:90%;max-height:100%;display:block;margin:0 auto}
    .pdp-tag{top:10px;left:10px;font-size:9px;padding:4px 8px}
    .pdp-name{font-size:clamp(18px,5vw,22px);margin-bottom:12px}
    .pdp-brand{margin-bottom:8px;font-size:10px}
    .pdp-price{font-size:32px}
    .pdp-price-row{margin-bottom:8px;gap:10px;align-items:center}
    .pdp-discount{font-size:10.5px;padding:5px 9px}
    .pdp-cuotas{margin-bottom:8px;font-size:13px}
    .pdp-efectivo{margin-bottom:18px;gap:8px;align-items:center}
    .pdp-efectivo-info{width:20px;height:20px;font-size:12px}
    .pdp-crumb{padding:8px 0 4px;font-size:11px}
    .pdp-crumb > span:last-child{max-width:160px}
    /* Mobile: el botón del cuerpo se oculta, queda el sticky de abajo */
    .pdp-buy .add-btn{display:none}
    .pdp-buy{justify-content:flex-start;margin-bottom:18px}
    .qty-stepper{flex:0 0 auto}
    .qty-stepper button{width:42px;height:46px;font-size:16px}
    .qty-stepper span{min-width:50px;height:46px;font-size:16px}
    .pdp-sticky{display:block}
    .pdp-sticky button{padding:13px 14px;font-size:12px;letter-spacing:0.08em}
    .pdp-sticky button .sticky-qty-badge{padding:2px 7px;font-size:11.5px}
    .pdp-perks{padding-top:14px}
    .pdp-social{padding:12px 14px;margin-bottom:20px;gap:10px}
    .pdp-social-line{font-size:12.5px}
    .pdp-stock{font-size:13px}
    .pdp-tabs{padding:32px 0 24px;margin-top:32px}
    .tab-nav{gap:18px;margin-bottom:24px}
    .related{padding:48px 0 32px}
    .related-grid{grid-template-columns:repeat(2,1fr);gap:12px}
    .mlcard-info{padding:10px 11px 13px}
    .mlcard-name{font-size:12.5px}
    .mlcard-price{font-size:18px}
    .wa-float{right:16px;bottom:84px;width:44px;height:44px}
    .wa-float svg{width:22px;height:22px}
  }

  /* Buscador grande en desktop (estilo ML) */
  .nav-searchbar{flex:1;max-width:640px;min-width:0;display:flex;align-items:center;gap:12px;height:44px;padding:0 18px;border:1.5px solid var(--line);border-radius:999px;background:#fff;color:var(--cream);font-family:var(--font-b);font-size:14px;cursor:pointer;text-decoration:none;transition:border-color .15s ease, box-shadow .15s ease}
  .nav-searchbar:hover{border-color:var(--red)}
  .nav-searchbar svg{flex-shrink:0;opacity:0.55}
  .nav-searchbar-text{opacity:0.55;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media (max-width:768px){.nav-searchbar{display:none}}
</style>
</head>
<body>

    </button>

<!-- MOBILE SEARCH BAR -->
<div class="nav-search">

    </button>
    <input type="search" name="q" placeholder="¿Qué estás buscando?" autocomplete="off" />
  </form>
</div>

<!-- PDP CONTENT (se renderiza con JS) -->
<main id="pdpRoot"></main>

<a class="wa-float" href="https://wa.me/" target="_blank" rel="noopener" aria-label="WhatsApp">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.92.5 3.78 1.46 5.43L2 22l4.78-1.55a9.85 9.85 0 0 0 5.26 1.5c5.45 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2z"/></svg>
</a>

<!-- STICKY BUY (mobile) — botón ancho "Agregar al carrito" + badge cantidad -->
<div class="pdp-sticky" id="pdpSticky">
  <button id="stickyAddBtn">
    <svg class="cart-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
    <span class="sticky-add-label">Agregar al carrito</span>
    <span class="sticky-qty-badge" id="stickyQty">1</span>
  </button>
</div>

<footer>
  <div class="container">
    <div>© 2026 Morashop · Suplementación deportiva en Argentina</div>
    <div>Términos · Privacidad · Cookies</div>
  </div>
</footer>

<script src="assets/catalog-data.js"></script>
<script src="assets/catalog.js"></script>
<script src="assets/cart.js"></script>
<script src="assets/promo-bar.js"></script>
<script src="assets/nav.js"></script>
<script>
(function () {
  const root = document.getElementById('pdpRoot');
  const stickyEl = document.getElementById('pdpSticky');
  const params = new URLSearchParams(window.location.search);

  // Helpers
  function slug(s) {
    return String(s).toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }
  function parsePrecio(s) {
    // "$ 13.965" -> 13965
    return parseInt(String(s).replace(/[^\d]/g, ''), 10) || 0;
  }
  // Adaptador: convierte un producto del catalogo REAL (catalog-data.js) al formato
  // que espera el resto de la PDP (catalog.js demo).
  function adaptarProductoReal(p, cat) {
    if (!p) return null;
    const CAT_LABEL = {
      suplementos:  'Suplementos',
      supermercado: 'Supermercado',
      electro:      'Electro-Hogar',
      bananero:     'El Bananero',
    };
    return {
      id: slug(p.brand + '-' + p.name),
      brand: p.brand || 'Morashop',
      name: p.name,
      img: p.img,
      price:    parsePrecio(p.price),
      oldPrice: p.was ? parsePrecio(p.was) : 0,
      tag: p.tag || '',
      tagKind: p.tagType || '',
      category: CAT_LABEL[cat] || '',
      desc: 'Producto original. Distribuidor autorizado.',  // descripcion default mientras no haya texto real por producto
      flavors: [],
      related: [],
    };
  }

  // Todos los links del sitio entran con ?cat=X&pid=Y -> buscamos en el catalogo real.
  const cat = params.get('cat');
  const pid = params.get('pid');

  let product = null;
  if (cat && pid && window.CATALOG_BY_CAT && window.CATALOG_BY_CAT[cat]) {
    const found = window.CATALOG_BY_CAT[cat].find(p => slug(p.brand + '-' + p.name) === pid);
    product = adaptarProductoReal(found, cat);
  }

  if (!product) {
    root.innerHTML = `
      <section class="pdp-error">
        <div class="container">
          <h1>Producto no encontrado</h1>
          <p>El producto que buscás no existe o fue retirado del catálogo.</p>
          <a href="suplementos.html">Ver catálogo →</a>
        </div>
      </section>`;
    document.title = 'Producto no encontrado · Morashop';
    return;
  }

  document.title = `${product.name} · Morashop`;

  const fmt = window.CATALOG_API.formatARS;
  const hasFlavors = Array.isArray(product.flavors) && product.flavors.length > 1;
  const discount = product.oldPrice ? Math.round((1 - product.price / product.oldPrice) * 100) : 0;

  // ----- Datos fake seedeados (UNIFICADO con cards: ((brand+name).toLowerCase()) -----
  function seedFromProduct(p) {
    const s = ((p.brand || '') + (p.name || '')).toLowerCase();
    let h = 0;
    for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h = h & h; }
    return Math.abs(h);
  }
  const seed       = seedFromProduct(product);
  const vendidosNum = (seed % 1500) + 50;                         // 50–1549 (igual que cards)
  const vendidos    = vendidosNum;                                // alias para compat
  const rating      = (4 + (seed % 100) / 100).toFixed(1);        // 4.00–4.99 (igual que cards)
  const opiniones   = Math.max(3, Math.floor(vendidosNum * 0.15));// 15% de vendidos (igual que cards)
  const stock       = (seed % 30) + 3;                            // 3–32 (igual que cards)
  const stockLow    = stock <= 5;
  const catParts = (product.category || '').split('>').map(s => s.trim());
  const catLink = catParts[0] && catParts[0].toLowerCase().startsWith('suplem') ? 'suplementos.html'
    : catParts[0] && catParts[0].toLowerCase().startsWith('super') ? 'supermercado.html'
    : catParts[0] && catParts[0].toLowerCase().startsWith('electro') ? 'electro.html'
    : 'suplementos.html';

  root.innerHTML = `
    <div class="container">
      <nav class="pdp-crumb" aria-label="Breadcrumb">
        <a href="index.html">Inicio</a><span class="sep">/</span>
        <a href="${catLink}">${catParts[0] || 'Catálogo'}</a><span class="sep">/</span>
        <span>${product.name}</span>
      </nav>
    </div>

    <section class="pdp">
      <div class="container">
        <div class="pdp-grid">
          <!-- GALLERY -->
          <div class="pdp-gallery">
            <div class="pdp-photo">
              ${product.tag ? `<span class="pdp-tag ${product.tagKind || ''}">${product.tag}</span>` : ''}
              <img src="${product.img}" alt="${product.name}" />
            </div>
          </div>

          <!-- INFO -->
          <div class="pdp-info">
            <div class="pdp-brand">${product.brand}</div>
            <h1 class="pdp-name">${product.name}</h1>

            <div class="pdp-price-row">
              ${product.oldPrice && discount >= 10 ? `<div class="pdp-oldprice">${fmt(product.oldPrice)}</div>` : ''}
              <div class="pdp-price" id="pdpPrice">${fmt(product.price)}</div>
              ${discount >= 5 ? `<div class="pdp-discount">${discount}% OFF</div>` : ''}
            </div>
            ${product.oldPrice && (product.oldPrice - product.price) > 0 ? `<div class="pdp-savings">Ahorrás ${fmt(product.oldPrice - product.price)}</div>` : ''}

            <div class="pdp-cuotas">3 cuotas sin interés de <strong>${fmt(Math.round(product.price/3))}</strong></div>

            <div class="pdp-efectivo">
              <span class="pdp-efectivo-main"><strong>${fmt(product.price * 0.85)}</strong> en efectivo</span>
              <span class="pdp-efectivo-tag">15% OFF</span>
              <button class="pdp-efectivo-info" type="button" aria-label="Más info" title="Contraentrega en CABA/GBA o transferencia">?</button>
            </div>

            <div class="pdp-social" aria-label="Información de stock y reseñas">
              <div class="pdp-social-line">
                <span>+${vendidos} vendidos</span>
                <span class="dot">·</span>
                <span class="star">★</span>
                <span class="rating-num">${rating}</span>
                <span>(${opiniones} opiniones)</span>
              </div>
              <div class="pdp-stock ${stockLow ? 'low' : ''}">
                <span class="dot" aria-hidden="true"></span>
                ${stockLow
                  ? `¡Pocas unidades! · Quedan ${stock}`
                  : `Stock disponible · ${stock} unidades`}
              </div>
            </div>

            ${hasFlavors ? `
              <div class="pdp-section">
                <div class="pdp-section-label">Sabor: <span class="picked" id="flavorPicked">${product.flavors[0]}</span></div>
                <div class="pdp-flavors" id="pdpFlavors">
                  ${product.flavors.map((f,i) => `<button class="flavor-btn ${i===0?'active':''}" data-flavor="${f}" type="button">${f}</button>`).join('')}
                </div>
              </div>
            ` : ''}

            <div class="pdp-section">
              <div class="pdp-section-label">Cantidad</div>
              <div class="pdp-buy">
                <div class="qty-stepper" aria-label="Selector de cantidad">
                  <button type="button" id="qtyMinus" aria-label="Restar">−</button>
                  <span id="qtyVal">1</span>
                  <button type="button" id="qtyPlus" aria-label="Sumar">+</button>
                </div>
                <button class="add-btn" id="pdpAddBtn" type="button">
                  <svg class="cart-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
                  Agregar
                </button>
              </div>
            </div>

            <div class="pdp-perks">
              <div class="pdp-perk">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 5v3h-7zM6 21a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM18 21a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg>
                <span><strong>Envío hoy</strong> en GBA y CABA para pedidos antes de las 10 hs</span>
              </div>
              <div class="pdp-perk">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>
                <span><strong>Producto original</strong> · distribuidor autorizado</span>
              </div>
              <div class="pdp-perk">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                <span><strong>Bot rápido + asesor</strong> por WhatsApp</span>
              </div>
            </div>
          </div>
        </div>

        <!-- TABS -->
        <div class="pdp-tabs">
          <div class="tab-nav" role="tablist">
            <button class="tab-btn active" data-tab="desc" type="button">Descripción</button>
            <button class="tab-btn" data-tab="ship" type="button">Envíos y devoluciones</button>
          </div>
          <div class="tab-panel active" data-panel="desc">
            <p>${product.desc || 'Sin descripción disponible.'}</p>
          </div>
          <div class="tab-panel" data-panel="ship">
            <p><strong>Envío en el día:</strong> pedidos confirmados antes de las 10 hs en GBA y CABA salen el mismo día.</p>
            <p><strong>Resto del país:</strong> OCA y Andreani, 24–72 hs hábiles según destino.</p>
            <p><strong>Devoluciones:</strong> 7 días corridos desde la recepción para productos sin abrir. Coordinamos por WhatsApp.</p>
          </div>
        </div>
      </div>
    </section>

    <!-- RELATED (siempre se renderiza; el JS llena la grilla con productos del mismo type/brand) -->
    <section class="related" id="relatedSection" style="display:none">
      <div class="container">
        <div class="related-head">
          <span class="overline"></span>
          <h2>Productos<br/>relacionados.</h2>
        </div>
        <div class="related-grid" id="relatedGrid"></div>
      </div>
    </section>
  `;

  // ----- State -----
  let qty = 1;
  let chosenFlavor = hasFlavors ? product.flavors[0] : null;

  // Qty stepper (sincroniza con sticky)
  const qtyVal     = document.getElementById('qtyVal');
  const stickyQty  = document.getElementById('stickyQty');
  function syncQty() {
    qtyVal.textContent = qty;
    if (stickyQty) stickyQty.textContent = qty;
  }
  document.getElementById('qtyMinus').addEventListener('click', () => {
    if (qty > 1) { qty--; syncQty(); }
  });
  document.getElementById('qtyPlus').addEventListener('click', () => {
    qty++; syncQty();
  });

  // Flavors
  if (hasFlavors) {
    document.getElementById('pdpFlavors').addEventListener('click', e => {
      const btn = e.target.closest('.flavor-btn');
      if (!btn) return;
      document.querySelectorAll('.flavor-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      chosenFlavor = btn.dataset.flavor;
      document.getElementById('flavorPicked').textContent = chosenFlavor;
    });
  }

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.querySelector(`.tab-panel[data-panel="${btn.dataset.tab}"]`).classList.add('active');
    });
  });

  // Add to cart (compartido entre desktop y sticky mobile)
  function addToCart() {
    if (!window.Cart) return;
    const variantId = chosenFlavor ? `${product.id}--${chosenFlavor.toLowerCase().replace(/[^a-z0-9]+/g,'-')}` : product.id;
    const displayName = chosenFlavor ? `${product.name} · ${chosenFlavor}` : product.name;
    window.Cart.add({
      id: variantId,
      brand: product.brand,
      name: displayName,
      price: product.price,
      img: product.img,
      cat: cat || ''
    }, qty);
  }
  document.getElementById('pdpAddBtn').addEventListener('click', () => {
    addToCart();
    const b = document.getElementById('pdpAddBtn');
    const orig = b.innerHTML;
    b.innerHTML = 'Agregado ✓';
    setTimeout(() => { b.innerHTML = orig; }, 1400);
  });

  // Sticky mobile: solo botón "Agregar al carrito" + badge cantidad (sin precio)
  // Sticky mobile = "Agregar (N)" — usa qty actual del stepper (closure)
  document.getElementById('stickyAddBtn').addEventListener('click', () => {
    addToCart();
    const b = document.getElementById('stickyAddBtn');
    const orig = b.innerHTML;
    b.innerHTML = 'Agregado ✓';
    setTimeout(() => { b.innerHTML = orig; }, 1400);
  });

  // ----- Related products (cross-sell real) -----
  // Filtra el catálogo real por mismo type[0] (preferido) o misma brand (fallback).
  // Excluye el producto actual. Ordena por descuento. Toma hasta 6.
  (function renderRelated() {
    if (!cat || !window.CATALOG_BY_CAT || !window.CATALOG_BY_CAT[cat]) return;
    const pool = window.CATALOG_BY_CAT[cat];

    // Buscamos el "raw" del catálogo para tener types[0] real
    const rawCurrent = pool.find(p => slug((p.brand || '') + '-' + (p.name || '')) === pid);
    if (!rawCurrent) return;
    const myType  = (rawCurrent.types && rawCurrent.types[0]) || '';
    const myBrand = rawCurrent.brand || '';
    const myKey   = slug((rawCurrent.brand || '') + '-' + (rawCurrent.name || ''));

    function discPct(p) {
      const now = parsePrecio(p.price), was = parsePrecio(p.was);
      return (was > now && now > 0) ? (1 - now / was) : 0;
    }

    // 1) Mismo type, distinto producto
    let sameType = pool.filter(p => {
      if (!p || !p.types || !p.types[0]) return false;
      if (slug((p.brand || '') + '-' + (p.name || '')) === myKey) return false;
      return p.types[0] === myType;
    });
    sameType.sort((a, b) => discPct(b) - discPct(a));

    let picks = sameType.slice(0, 6);

    // 2) Si quedan <3, completar con misma brand (sin duplicar)
    if (picks.length < 3 && myBrand) {
      const picked = new Set(picks.map(p => slug((p.brand || '') + '-' + (p.name || ''))));
      const sameBrand = pool.filter(p => {
        if (!p || !p.brand) return false;
        const k = slug(p.brand + '-' + (p.name || ''));
        if (k === myKey || picked.has(k)) return false;
        return p.brand === myBrand;
      });
      sameBrand.sort((a, b) => discPct(b) - discPct(a));
      picks = picks.concat(sameBrand).slice(0, 6);
    }

    if (!picks.length) return;

    const grid = document.getElementById('relatedGrid');
    const section = document.getElementById('relatedSection');
    if (!grid || !section) return;

    grid.innerHTML = picks.map(p => {
      const now  = parsePrecio(p.price);
      const was  = parsePrecio(p.was);
      const disc = (was > now && now > 0) ? Math.round((1 - now / was) * 100) : 0;
      const cuota = Math.round(now / 3);
      const pidx = slug((p.brand || '') + '-' + (p.name || ''));
      const offBadge = disc >= 5 ? `<span class="mlcard-off">${disc}% OFF</span>` : '';
      const wasRow   = was > now ? `<div class="mlcard-was">${fmt(was)}</div>` : '';
      const discTxt  = disc >= 5 ? `<span class="mlcard-disc">${disc}% OFF</span>` : '';
      return `<a class="mlcard" href="producto.html?cat=${encodeURIComponent(cat)}&pid=${encodeURIComponent(pidx)}" data-pid="${encodeURIComponent(pidx)}">
        <div class="mlcard-ph">${offBadge}<img src="${p.img}" alt="${(p.name || '').replace(/"/g,'&quot;')}" loading="lazy" /></div>
        <div class="mlcard-info">
          <div class="mlcard-brand">${p.brand || ''}</div>
          <div class="mlcard-name">${p.name || ''}</div>
          ${wasRow}
          <div class="mlcard-price-row"><span class="mlcard-price">${fmt(now)}</span>${discTxt}</div>
          <div class="mlcard-cuotas">3 cuotas sin interés de ${fmt(cuota)}</div>
          <div class="mlcard-foot"><button class="mlcard-add" type="button" data-mladd><svg class="cart-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg><span>Agregar</span></button></div>
        </div>
      </a>`;
    }).join('');

    section.style.display = '';

    // Handler "Agregar al carrito" sin abrir la PDP
    grid.querySelectorAll('[data-mladd]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        const card = e.currentTarget.closest('.mlcard');
        if (!card) return;
        const pidCard = decodeURIComponent(card.dataset.pid || '');
        const prod = pool.find(p => slug((p.brand || '') + '-' + (p.name || '')) === pidCard);
        if (prod && window.Cart) {
          window.Cart.add({
            id: pidCard,
            brand: prod.brand,
            name: prod.name,
            price: parsePrecio(prod.price),
            img: prod.img,
            cat: cat || ''
          });
        }
        const orig = e.currentTarget.innerHTML;
        e.currentTarget.innerHTML = '<span>Agregado ✓</span>';
        setTimeout(() => { e.currentTarget.innerHTML = orig; }, 1400);
      });
    });
  })();
})();
</script>
</body>
